<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo | Home </title>
    <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon">

    <!-- tailwind css and daisyui -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font-Awasome -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
     <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
     <!-- icons-font-asw -->
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
     <style>
        *{
            font-family: "Outfit", sans-serif;
        }
     </style>
</head>
<body class="min-h-screen max-w-md bg-base-200 mx-auto">
    <header class="border-b-2 border-gray-300 sticky top-0 bg-base-200 z-10">
        <section class="w-11/12 mx-auto py-3 flex justify-between items-center ">
            <div class="left flex gap-1">
                <div class="logo w-[60px]">
                    <img src="./assets/logo.png" alt="">
                </div>
                <div class="balance-info">
                    <h2 class="text-2xl font-bold">$<span id="balance">45000</span></h2>
                    <P class="text-neutral/50">Available Balance</P>
                </div>
            </div>
            <div class="Right"> 
                <a href="./index.html" class="btn byn-soft"><i class="fa-solid fa-arrow-right-from-bracket"></i>logout</a>
            </div>
        </section>
    </header>
    <section class="w-11/12 mx-auto py-10 space-y-5">
        <h2 class="text-3xl font-bold" >Wellcome to pay<span class="text-primary">oo</span></h2>
        <P class="text-neutral/50 ">Enjoy easy and convenient financial services width us. Cashout charge is low and </P>
        <div class="buttons grid grid-cols-3 gap-3">
            <button onclick="showOnly('add-money')" class="btn h-full flex-col py-4 btn-primary btn-soft">
                <img src="assets/opt-1.png" alt="">
                <p>Add Money</p>
            </button>
            <button onclick="showOnly('Cashout')" class="btn h-full flex-col py-4 btn-primary btn-soft">
                <img src="assets/opt-2.png" alt="">
                <p>Cashout</p>
            </button>
            <button class="btn h-full flex-col py-4 btn-primary btn-soft">
                <img src="assets/opt-3.png" alt="">
                <p>Sent Money </p>
            </button>
            <button class="btn h-full flex-col py-4 btn-primary btn-soft">
                <img src="assets/opt-4.png" alt="">
                <p>Get  Bonus</p>
            </button>
            <button class="btn h-full flex-col py-4 btn-primary btn-soft">
                <img src="assets/opt-5.png" alt="">
                <p>Pay Bill</p>
            </button>
            <button onclick="showOnly('history')" class="btn h-full flex-col py-4 btn-primary btn-soft">
                <img src="assets/opt-6.png" alt="">
                <p>Transactions</p>
            </button>
        </div>
    </section>

    <!-- Add Money Section -->
    <section id="add-money" class="w-11/12 mx-auto py-5 hidden" >
        <h2 class="text-xl font-bold pb-5">Add Money</h2>
        <div class="card bg-base-100 w-full shadow rounded-2xl">
      <div class="card-body">
        <fieldset class="fieldset">
            <label class="label text-neutral font-bold ">Select Bank</label>

        <select id="add-money-bank" class="select w-full bg-base-200 rounded-full">
           <option disabled selected>Select a Bank</option>
           <option value="DBBL">DBBL</option>
           <option value="IBBL">IBBl</option>
           <option value="CITY">City Bank</option>
        </select>

        <br>

          <label class="label text-neutral font-bold "> Bank Account Number</label>
          <input id="add-money-number" maxlength="11" minlength="11" type="text" class="input rounded-full bg-base-200 w-full " value="01234567890" placeholder="Enter 11 digit account number" />

          <br>
          <label class="label text-neutral font-bold ">Amount to Add</label>
          <input id="add-money-amount" type="number" class="input rounded-full bg-base-200 w-full "  placeholder="Add Amount to withdraw"/>

          <br>

          <label class="label font-bold text-neutral">Pin Number</label>
          <input id="add-money-pin" type="password" maxlength="4" class="input  rounded-full bg-base-200 w-full " placeholder="Enter 4 digit pin number" />
          
          <button id="add-money-btn" class="btn btn-primary mt-4 rounded-full">
            Add Money
          </button>
        </fieldset>
      </div>
    </div>
    </section>

    <section id="Cashout" class="w-11/12 mx-auto py-5 hidden" >
        <h2 class="text-xl font-bold pb-5">Cashout</h2>
        <div class="card bg-base-100 w-full shadow rounded-2xl">
      <div class="card-body">
        <fieldset class="fieldset">
          <label class="label text-neutral font-bold ">Agent Number</label>
          <input id="Cashout-number" maxlength="11" minlength="11" type="text" class="input rounded-full bg-base-200 w-full " value="01234567890" placeholder="Enter Agent 11 digit number" />

          <br>
          <label class="label text-neutral font-bold ">Amount</label>
          <input id="Cashout-Amount" type="number" class="input rounded-full bg-base-200 w-full " value="01234567890" placeholder="Enter your Amount for withdraw" />

          <br>

          <label class="label font-bold text-neutral">4 Digit Pin</label>
          <input id="Cashout-pin" type="password" maxlength="4" class="input  rounded-full bg-base-200 w-full " placeholder="Enter 4 Digit pin" />
          <div></div>
          <button id="Cashout-btn" class="btn btn-primary mt-4 rounded-full">
            withDraw Money
          </button>
        </fieldset>
      </div>
    </div>
    </section>  

<!-- history section -->
 <section id="history" class="w-11/12 mx-auto py-5 hidden">
    <h2 class="text-xl font-bold pb-5">Transactions</h2>
    <div class=" space-y-5" id="history-container">

    </div>
       
 </section>

    <script src="script/Machine.js"></script>
    <script src="script/addMoney.js"></script>
    <script src="script/Cashout.js"></script>
</body>
</html>
